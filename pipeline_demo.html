<html>
  <head>
    <style>
      body {
        font-family: sans-serif;
        padding: 16px;
        background: #f5f5f5;
      }
      h1 {
        color: #2563eb;
        border-bottom: 2px solid #2563eb;
        padding-bottom: 6px;
      }
      .card {
        background: white;
        border-radius: 8px;
        padding: 14px;
        margin: 10px 0;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
      }
      status-badge {
        display: inline-block;
        margin: 4px;
      }
      .svg-section {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .p {
        margin: 25px;
      }
    </style>
  </head>
  <body>
    <h1>Stream &#x2192; Sanitize &#x2192; Render Pipeline</h1>

    <div
      class="card"
      style="display: flex; flex-wrap: wrap; align-items: center; gap: 8px"
    >
      <b>Custom elements:</b>
      <status-badge>
        <span
          style="
            background: #16a34a;
            color: white;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
          "
          >OK</span
        >
      </status-badge>
      <status-badge>
        <span
          style="
            background: #dc2626;
            color: white;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
          "
          >ERROR</span
        >
      </status-badge>
      <status-badge>
        <span
          style="
            background: #7c3aed;
            color: white;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
          "
          >PENDING</span
        >
      </status-badge>
    </div>

    <div class="card">
      <p style="color: #7c3aed; font-weight: bold">
        Inline style: purple bold text.
      </p>
      <p style="color: #0891b2">Inline style: cyan text.</p>
    </div>

    <div class="card svg-section">
      <svg width="90" height="90" viewBox="0 0 90 90">
        <circle cx="45" cy="45" r="35" fill="#f97316"></circle>
        <text
          x="33"
          y="50"
          fill="white"
          font-size="14"
          font-family="sans-serif"
        >
          SVG
        </text>
      </svg>
      <p style="color: #6b7280; font-size: 14px">
        SVG circle rendered via ThorVG.
      </p>
    </div>
  </body>
</html>
