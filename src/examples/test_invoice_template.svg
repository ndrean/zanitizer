<svg width="595" height="842" viewBox="0 0 595 842" xmlns="http://www.w3.org/2000/svg">
  <!-- A4 page background -->
  <rect width="595" height="842" fill="#ffffff" />

  <!-- Header band -->
  <rect x="0" y="0" width="595" height="120" fill="#1e293b" />

  <!-- Accent stripe -->
  <rect x="0" y="120" width="595" height="4" fill="#3b82f6" />

  <!-- Invoice details box -->
  <rect x="350" y="160" width="200" height="90" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1" />

  <!-- Items table header -->
  <rect x="45" y="340" width="505" height="36" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />

  <!-- Table row separators -->
  <line x1="45" y1="412" x2="550" y2="412" stroke="#e2e8f0" stroke-width="0.5" />
  <line x1="45" y1="448" x2="550" y2="448" stroke="#e2e8f0" stroke-width="0.5" />
  <line x1="45" y1="484" x2="550" y2="484" stroke="#e2e8f0" stroke-width="0.5" />

  <!-- Totals box -->
  <rect x="350" y="520" width="200" height="80" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />

  <!-- Footer band -->
  <rect x="0" y="790" width="595" height="52" fill="#f8fafc" />
  <line x1="0" y1="790" x2="595" y2="790" stroke="#e2e8f0" stroke-width="1" />
</svg>
