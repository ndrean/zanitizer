<html>
  <head>
    <title>Lit-HTML</title>
  </head>
  <body>
    <div id="app"></div>
    <!--<script src="js-bench-lit-html.js"></script>-->
    <script type="module">
      console.log("--- Checking Lit-HTML DOM Requirements ---");
      const requiredMethods = [
        "cloneNode",
        "remove",
        "replaceWith",
        "replaceChildren",
        "getRootNode",
        "append",
        "prepend",
        "insertBefore",
        "appendChild",
        "removeChild",
        "hasAttribute",
        "removeAttribute",
      ];

      requiredMethods.forEach((method) => {
        // Check Element, Node, and DocumentFragment prototypes
        const onElement = !!globalThis.Element?.prototype[method];
        const onNode = !!globalThis.Node?.prototype[method];
        const onDocFrag = !!globalThis.DocumentFragment?.prototype[method];

        if (!onElement && !onNode && !onDocFrag) {
          console.log("🚨 MISSING DOM METHOD:", method);
        }
      });
      console.log("------------------------------------------");
      // 1. Pull directly from esm.sh
      import { html, render } from "https://esm.sh/lit-html/?dev";
      console.log(typeof html, typeof render);

      console.log("[Test] lit-html loaded! Defining template...");

      // 2. Define a declarative template (This tests template strings and <template> tags)
      const myTemplate = (name, status) => html`
        <div style="border: 2px solid #ccc; padding: 10px;">
          <h2>System: ${name}</h2>
          <p>
            Status:
            <span style="color: ${status === "Online" ? "green" : "red"}"
              >${status}</span
            >
          </p>
        </div>
      `;

      // 3. Render it to the DOM! (This tests TreeWalker and DocumentFragment)
      const container = document.getElementById("app");
      console.log("[Test] Rendering...");

      try {
        render(myTemplate("Zexplorer Rendering Engine", "Online"), container);
        console.log("[Test] lit-html render complete!");
      } catch (err) {
        console.log("🔥 LIT-HTML CRASHED:");
        console.log(err.message);
        console.log(err.stack);
      }

      console.log("[Test] lit-html render complete!");
    </script>
  </body>
</html>
