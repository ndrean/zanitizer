<!doctype html>
<html>
  <head>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" type="module"></script>
  </head>
  <body>
    <div id="map" style="width: 800px; height: 600px"></div>

    <script>
      async function runLeafletGeoJSON() {
        console.log("[Test] Booting Leaflet GeoJSON Engine...");

        const map = L.map("map", {
          zoomControl: false,
          attributionControl: false,
        }).setView([51.505, -0.09], 13);

        L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(
          map,
        );

        // Draw a path from Hyde Park to the Tower of London!
        const route = {
          type: "LineString",
          coordinates: [
            [-0.15, 51.505],
            [-0.12, 51.51],
            [-0.076, 51.508],
          ],
        };
        L.geoJSON(route, {
          style: { color: "red", weight: 6, opacity: 0.8 },
        }).addTo(map);

        // 1. Extract the Tiles
        const tiles = Array.from(
          document.querySelectorAll("img.leaflet-tile"),
        ).map((img) => ({
          url: img.src,
          x: parseInt(img.style.left || 0, 10),
          y: parseInt(img.style.top || 0, 10),
        }));

        // 2. Extract the SVG Vector Data!
        const svgElement = document.querySelector(".leaflet-overlay-pane svg");
        const svgString = svgElement ? svgElement.outerHTML : "";

        console.log(`✅ Extracted ${tiles.length} tiles and SVG overlay!`);

        const readyTiles = [];
        for (const t of tiles) {
          try {
            const res = await fetch(t.url);
            const buffer = await res.arrayBuffer();
            readyTiles.push({
              buffer: buffer,
              x: t.x,
              y: t.y,
              w: t.w,
              h: t.h,
            });
            console.log(`  + Fetched tile at (${t.x}, ${t.y})`);
          } catch (e) {
            console.log(`  - Failed to fetch ${t.url}`);
          }
        }

        // Send to Zig to Compositor
        zxp.generateRoutePng(readyTiles, svgString, "london_route.png");
        console.log("🌍 Check for the generated image: 'london_route.png'");
      }
      runLeafletGeoJSON().catch((e) =>
        console.error("Error:", e.message, e.stack),
      );
    </script>
  </body>
</html>
