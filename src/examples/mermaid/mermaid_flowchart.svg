<svg id="mermaid-svg" width="800" xmlns="http://www.w3.org/2000/svg" class="flowchart" style="max-width: 16px;"
    viewBox="0 0 2000 2000" role="graphics-document document" aria-roledescription="flowchart-v2">
    <style>
        #mermaid-svg {
            font-family: "trebuchet ms", verdana, arial, sans-serif;
            font-size: 16px;
            fill: #333;
        }

        @keyframes edge-animation-frame {
            from {
                stroke-dashoffset: 0;
            }
        }

        @keyframes dash {
            to {
                stroke-dashoffset: 0;
            }
        }

        #mermaid-svg .edge-animation-slow {
            stroke-dasharray: 9, 5 !important;
            stroke-dashoffset: 900;
            animation: dash 50s linear infinite;
            stroke-linecap: round;
        }

        #mermaid-svg .edge-animation-fast {
            stroke-dasharray: 9, 5 !important;
            stroke-dashoffset: 900;
            animation: dash 20s linear infinite;
            stroke-linecap: round;
        }

        #mermaid-svg .error-icon {
            fill: #552222;
        }

        #mermaid-svg .error-text {
            fill: #552222;
            stroke: #552222;
        }

        #mermaid-svg .edge-thickness-normal {
            stroke-width: 1px;
        }

        #mermaid-svg .edge-thickness-thick {
            stroke-width: 3.5px;
        }

        #mermaid-svg .edge-pattern-solid {
            stroke-dasharray: 0;
        }

        #mermaid-svg .edge-thickness-invisible {
            stroke-width: 0;
            fill: none;
        }

        #mermaid-svg .edge-pattern-dashed {
            stroke-dasharray: 3;
        }

        #mermaid-svg .edge-pattern-dotted {
            stroke-dasharray: 2;
        }

        #mermaid-svg .marker {
            fill: #333333;
            stroke: #333333;
        }

        #mermaid-svg .marker.cross {
            stroke: #333333;
        }

        #mermaid-svg svg {
            font-family: "trebuchet ms", verdana, arial, sans-serif;
            font-size: 16px;
        }

        #mermaid-svg p {
            margin: 0;
        }

        #mermaid-svg .label {
            font-family: "trebuchet ms", verdana, arial, sans-serif;
            color: #333;
        }

        #mermaid-svg .cluster-label text {
            fill: #333;
        }

        #mermaid-svg .cluster-label span {
            color: #333;
        }

        #mermaid-svg .cluster-label span p {
            background-color: transparent;
        }

        #mermaid-svg .label text,
        #mermaid-svg span {
            fill: #333;
            color: #333;
        }

        #mermaid-svg .node rect,
        #mermaid-svg .node circle,
        #mermaid-svg .node ellipse,
        #mermaid-svg .node polygon,
        #mermaid-svg .node path {
            fill: #ECECFF;
            stroke: #9370DB;
            stroke-width: 1px;
        }

        #mermaid-svg .rough-node .label text,
        #mermaid-svg .node .label text,
        #mermaid-svg .image-shape .label,
        #mermaid-svg .icon-shape .label {
            text-anchor: middle;
        }

        #mermaid-svg .node .katex path {
            fill: #000;
            stroke: #000;
            stroke-width: 1px;
        }

        #mermaid-svg .rough-node .label,
        #mermaid-svg .node .label,
        #mermaid-svg .image-shape .label,
        #mermaid-svg .icon-shape .label {
            text-align: center;
        }

        #mermaid-svg .node.clickable {
            cursor: pointer;
        }

        #mermaid-svg .root .anchor path {
            fill: #333333 !important;
            stroke-width: 0;
            stroke: #333333;
        }

        #mermaid-svg .arrowheadPath {
            fill: #333333;
        }

        #mermaid-svg .edgePath .path {
            stroke: #333333;
            stroke-width: 2.0px;
        }

        #mermaid-svg .flowchart-link {
            stroke: #333333;
            fill: none;
        }

        #mermaid-svg .edgeLabel {
            background-color: rgba(232, 232, 232, 0.8);
            text-align: center;
        }

        #mermaid-svg .edgeLabel p {
            background-color: rgba(232, 232, 232, 0.8);
        }

        #mermaid-svg .edgeLabel rect {
            opacity: 0.5;
            background-color: rgba(232, 232, 232, 0.8);
            fill: rgba(232, 232, 232, 0.8);
        }

        #mermaid-svg .labelBkg {
            background-color: rgba(232, 232, 232, 0.5);
        }

        #mermaid-svg .cluster rect {
            fill: #ffffde;
            stroke: #aaaa33;
            stroke-width: 1px;
        }

        #mermaid-svg .cluster text {
            fill: #333;
        }

        #mermaid-svg .cluster span {
            color: #333;
        }

        #mermaid-svg div.mermaidTooltip {
            position: absolute;
            text-align: center;
            max-width: 200px;
            padding: 2px;
            font-family: "trebuchet ms", verdana, arial, sans-serif;
            font-size: 12px;
            background: hsl(80, 100%, 96.2745098039%);
            border: 1px solid #aaaa33;
            border-radius: 2px;
            pointer-events: none;
            z-index: 100;
        }

        #mermaid-svg .flowchartTitleText {
            text-anchor: middle;
            font-size: 18px;
            fill: #333;
        }

        #mermaid-svg rect.text {
            fill: none;
            stroke-width: 0;
        }

        #mermaid-svg .icon-shape,
        #mermaid-svg .image-shape {
            background-color: rgba(232, 232, 232, 0.8);
            text-align: center;
        }

        #mermaid-svg .icon-shape p,
        #mermaid-svg .image-shape p {
            background-color: rgba(232, 232, 232, 0.8);
            padding: 2px;
        }

        #mermaid-svg .icon-shape rect,
        #mermaid-svg .image-shape rect {
            opacity: 0.5;
            background-color: rgba(232, 232, 232, 0.8);
            fill: rgba(232, 232, 232, 0.8);
        }

        #mermaid-svg .label-icon {
            display: inline-block;
            height: 1em;
            overflow: visible;
            vertical-align: -0.125em;
        }

        #mermaid-svg .node .label-icon path {
            fill: currentColor;
            stroke: revert;
            stroke-width: revert;
        }

        #mermaid-svg :root {
            --mermaid-font-family: "trebuchet ms", verdana, arial, sans-serif;
        }
    </style>
