<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: sans-serif;
        padding: 16px;
        background: #f5f5f5;
      }
      h1 {
        color: #2563eb;
        border-bottom: 2px solid #2563eb;
        padding-bottom: 6px;
      }
      .p {
        margin: 25px;
      }
      .card {
        background: white;
        border-radius: 8px;
        padding: 14px;
        margin: 10px 0;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
      }
      status-badge {
        display: inline-block;
        margin: 4px;
      }
      .svg-section {
        display: flex;
        align-items: center;
        gap: 12px;
      }
    </style>
    <script>
      class StatusBadge extends HTMLElement {
        connectedCallback() {
          const status = this.getAttribute("status") || "unknown";
          const color = status === "ok" ? "#16a34a" : "#dc2626";
          this.attachShadow({ mode: "open" });
          this.shadowRoot.innerHTML = `
            <span style="background:${color}; color:white; padding:3px 10px;
                         border-radius:999px; font-size:13px; font-weight:600;">
              ${status.toUpperCase()}
            </span>`;
        }
      }
      customElements.define("status-badge", StatusBadge);
    </script>
  </head>
  <body>
    <h1>Stream → Sanitize → Render Pipeline</h1>

    <!-- custom element -->
    <div class="card">
      <b>Custom elements:</b>
      <status-badge status="ok"></status-badge>
      <status-badge status="error"></status-badge>
      <status-badge status="pending"></status-badge>
    </div>

    <!-- inline style -->
    <div class="card">
      <p style="color: #7c3aed; font-weight: bold">
        Inline style: purple bold text (parsed via loadInlineStyles).
      </p>
      <p style="color: #0891b2">Inline style: cyan text.</p>
    </div>

    <!-- SVG with "bad" event-handler attributes that the sanitizer should strip -->
    <div class="card svg-section">
      <svg
        width="90"
        height="90"
        onclick="evil()"
        onmouseover="stealCookies()"
        viewBox="0 0 90 90"
      >
        <circle cx="45" cy="45" r="35" fill="#f97316" />
        <text
          x="45"
          y="50"
          text-anchor="middle"
          fill="white"
          font-size="14"
          font-family="sans-serif"
        >
          SVG
        </text>
      </svg>
      <p style="color: #6b7280; font-size: 14px">
        SVG has <code>onclick</code> and <code>onmouseover</code> — the
        sanitizer should remove them.
      </p>
    </div>
  </body>
</html>
