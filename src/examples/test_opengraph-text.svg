<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="200" fill="#e94560" opacity="0.08"/>
  <circle cx="1100" cy="500" r="150" fill="#f5a623" opacity="0.06"/>
  <circle cx="150" cy="550" r="180" fill="#533483" opacity="0.1"/>

  <!-- Accent bar -->
  <rect x="60" y="200" width="6" height="120" fill="url(#accent)" rx="3"/>

  <!-- Title (native SVG text - thorvg renders this, nanosvg cannot) -->
  <text x="90" y="260" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#ffffff">Zexplorer</text>

  <!-- Subtitle -->
  <text x="90" y="310" font-family="Arial, sans-serif" font-size="28" fill="#a0a0c0">Native DOM + Canvas + SVG in Zig</text>

  <!-- Feature bullets -->
  <text x="90" y="400" font-family="Arial, sans-serif" font-size="22" fill="#c0c0e0">- ThorVG SVG rasterizer with native text</text>

  <text x="90" y="440" font-family="Arial, sans-serif" font-size="22" fill="#c0c0e0">- QuickJS-ng JavaScript engine</text>

  <text x="90" y="480" font-family="Arial, sans-serif" font-size="22" fill="#c0c0e0">- Lexbor HTML5 parser + CSS engine</text>

  <!-- Footer line -->
  <rect x="60" y="560" width="1080" height="1" fill="#ffffff" opacity="0.15"/>

  <!-- Footer text -->
  <text x="60" y="590" font-family="Arial, sans-serif" font-size="18" fill="#808080">github.com/nevendrean/zexplorer</text>
  <text x="1140" y="590" font-family="Arial, sans-serif" font-size="18" fill="#808080" text-anchor="end">Built with Zig</text>
</svg>
