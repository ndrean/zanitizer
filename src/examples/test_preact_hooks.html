<html>
  <body>
    <h1>Preact Demo (QuickJS compatible)</h1>
    <div id="root"></div>
    <script type="module">
      import { h, render } from "preact";
      import { useState } from "preact/hooks";

      console.log("[JS] Preact + Hooks loaded");

      const root = document.getElementById("root");

      // ============================================================
      // QuickJS Limitations:
      // 1. onclick/on* props cause regex stack overflow in Preact
      // 2. Nested components cause stack overflow
      // Workaround: Manual event binding after render
      // ============================================================

      // Store setCount globally so we can access it after render
      let globalSetCount = null;

      const App = () => {
        const [count, setCount] = useState(0);
        globalSetCount = setCount;
        console.log("[JS] App render, count =", count);

        return h('div', { class: 'app' },
          h('h1', null, 'Preact Counter'),
          h('p', { id: 'count-display' }, `Count: ${count}`),
          h('button', { id: 'increment-btn' }, '+1')
        );
      };

      try {
        render(h(App), root);
        console.log("[JS] Rendered successfully!");
        console.log("[JS] innerHTML:", root.innerHTML);

        // Manual event binding (workaround for onclick prop issue)
        const btn = document.getElementById('increment-btn');
        if (btn) {
          btn.addEventListener('click', () => {
            console.log("[JS] Button clicked!");
            if (globalSetCount) {
              globalSetCount(c => c + 1);
            }
          });
          console.log("[JS] Click handler attached to button");

          // Test clicking via dispatchEvent
          console.log("[JS] Dispatching test clicks...");
          for (let i = 0; i < 3; i++) {
            setTimeout(() => {
              btn.dispatchEvent(new Event('click'));
            }, (i + 1) * 500);
          }

          // Check DOM after all clicks
          setTimeout(() => {
            console.log("[JS] Final innerHTML:", root.innerHTML);
            const countEl = document.getElementById('count-display');
            console.log("[JS] Count element text:", countEl?.textContent);
          }, 2000);
        }
      } catch (e) {
        console.log("[JS] Render error:", e.message);
        if (e.stack) console.log("[JS] Stack:", e.stack.split("\n").slice(0, 3).join("\n"));
      }
    </script>
  </body>
</html>
