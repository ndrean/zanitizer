<html>
  <head> </head>
  <body>
    <!--<canvas id="canvas"></canvas>-->
    <script>
      globalThis.window = globalThis;
      // Intl polyfill for Chart.js tick label formatting
      if (typeof Intl === "undefined") {
        globalThis.Intl = {
          NumberFormat: function(locale, opts) {
            return { format: function(n) { return String(n); } };
          }
        };
      }
      console.log("Chart ? ", typeof globalThis.Chart, globalThis.Chart);
      window.devicePixelRatio = 1;
      window.requestAnimationFrame = (cb) => setTimeout(cb, 0);
      // const canvas = document.getElementById("canvas");
      const canvas = document.createElement("canvas");
      canvas.width = 800;
      canvas.height = 600;
      document.body.insertAdjacentElement("afterbegin", canvas);
      console.log("canvas attributes: ", canvas.getAttribute("height") == 600);

      async function render() {
        const config = {
          type: "bar",
          data: {
            labels: ["Zig", "Rust", "C++", "Go", "Python"],
            datasets: [
              {
                label: "Performance (Imaginary Units)",
                data: [150, 145, 140, 120, 80],
                backgroundColor: [
                  "rgba(255, 99, 132, 0.8)",
                  "rgba(54, 162, 235, 0.8)",
                  "rgba(255, 206, 86, 0.8)",
                  "rgba(75, 192, 192, 0.8)",
                  "rgba(153, 102, 255, 0.8)",
                ],
                borderColor: "black",
                borderWidth: 2,
              },
            ],
          },
          options: {
            //          CRITICAL: Disable animation for SSR
            animation: false,
            responsive: false,
            plugins: {
              title: {
                display: true,
                text: "Language Speed Test",
                font: { size: 30 },
              },
            },
          },
        };

        new globalThis.Chart(canvas, config);

        // Since animation is false, it renders synchronously!
        const blob = await canvas.toBlob();
        return await blob.arrayBuffer();
      }
      render().catch(e => { console.log("render error:", e.message, e.stack); throw e; });
    </script>
  </body>
</html>
