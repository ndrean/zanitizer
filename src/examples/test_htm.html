<html>
  <body>
    <h1>HTM + Preact Demo</h1>
    <div id="root"></div>
    <script type="module">
      // HTM/Preact standalone bundles everything together
      import { html, render, useState } from "htm/preact/standalone";

      console.log("[JS] HTM + Preact standalone loaded");
      const root = document.getElementById("root");

      // ============================================================
      // HTM allows JSX-like syntax with tagged template literals
      // IMPORTANT: Run with --release=fast
      // ============================================================

      // Nested component using HTM syntax
      const Button = ({ onClick, children }) => {
        console.log("[JS] Button render");
        return html`<button id="increment-btn" onclick=${onClick}>
          ${children}
        </button>`;
      };

      const CountDisplay = ({ count }) => {
        console.log("[JS] CountDisplay render, count =", count);
        return html`<p id="count-display">Count: ${count}</p>`;
      };

      const App = () => {
        const [count, setCount] = useState(0);
        console.log("[JS] App render, count =", count);

        const handleClick = () => {
          console.log("[JS] Button clicked!");
          setCount((c) => c + 1);
        };

        return html`
          <div class="app">
            <h2>HTM Counter</h2>
            <${CountDisplay} count=${count} />
            <${Button} onClick=${handleClick}>+1<//>
          </div>
        `;
      };

      try {
        render(html`<${App} />`, root);
        console.log("[JS] Rendered successfully!");
        console.log("[JS] Initial innerHTML: ", root.innerHTML);

        // Test clicks
        const btn = document.getElementById("increment-btn");
        if (btn) {
          console.log("[JS] Testing clicks...");
          for (let i = 0; i < 3; i++) {
            setTimeout(
              () => btn.dispatchEvent(new Event("click")),
              (i + 1) * 100,
            );
          }
          setTimeout(() => {
            console.log(
              "[JS] Final count:",
              document.getElementById("count-display")?.textContent,
            );
          }, 500);
        }
      } catch (e) {
        console.log("[JS] ERROR:", e.message);
        if (e.stack)
          console.log(
            "[JS] Stack:",
            e.stack.split("\n").slice(0, 3).join("\n"),
          );
      }
    </script>
  </body>
</html>
