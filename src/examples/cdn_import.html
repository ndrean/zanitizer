<html>
  <title class="animate__animated animate__bounce">Testing CDN import</title>
  <head>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/animate.css@4.1.1/animate.min.css"
    />
    <style>
      body {
        background-color: #f0f0f0;
        color: #333;
      }
    </style>
  </head>
  <body>
    <h1>Testing CDN import: Estoolkit</h1>
    <div id="root"></div>
    <script type="module">
      // Polyfill requestAnimationFrame for React scheduler
      if (typeof requestAnimationFrame === 'undefined') {
        globalThis.requestAnimationFrame = (callback) => setTimeout(callback, 16);
        globalThis.cancelAnimationFrame = (id) => clearTimeout(id);
      }

      // Polyfill MessageChannel for React scheduler
      if (typeof MessageChannel === 'undefined') {
        globalThis.MessageChannel = class {
          constructor() {
            this.port1 = { onmessage: null };
            this.port2 = {
              postMessage: () => {
                queueMicrotask(() => {
                  if (this.port1.onmessage) this.port1.onmessage({ data: undefined });
                });
              }
            };
          }
        };
      }

      console.log("[JS] Script starting...");

      // Test es-toolkit first
      import * as ETK from "estoolkit";
      console.log("[JS] es-toolkit loaded");
      const m = ETK.mean([10, 50, 100, 160]);
      console.log(`[JS] ✅ es-toolkit 'mean': ${m}`);

      // Quick DOM check
      const rootElement = document.getElementById("root");
      console.log("[JS] rootElement:", rootElement ? "found" : "not found");
      console.log("[JS] nodeType:", rootElement.nodeType);
      console.log("[JS] ownerDocument:", rootElement.ownerDocument ? "yes" : "no");
      console.log("[JS] createElement:", typeof document.createElement);
      console.log("[JS] createComment:", typeof document.createComment);
      console.log("[JS] removeChild:", typeof rootElement.removeChild);

      // First verify basic DOM works
      console.log("[JS] Testing basic DOM...");
      const testEl = document.createElement("span");
      testEl.textContent = "Test";
      rootElement.appendChild(testEl);
      const fc = rootElement.firstChild;
      console.log("[JS] firstChild object:", fc);
      console.log("[JS] firstChild.nodeName:", fc?.nodeName);
      console.log("[JS] firstChild.tagName:", fc?.tagName);
      console.log("[JS] firstChild.nodeType:", fc?.nodeType);
      console.log("[JS] firstChild.textContent:", fc?.textContent);

      // Clear for Preact test
      while (rootElement.firstChild) {
        rootElement.removeChild(rootElement.firstChild);
      }
      console.log("[JS] Cleared root, firstChild:", rootElement.firstChild);

      // Try Preact first (smaller, might work better)
      import { h, render } from "preact";
      console.log("[JS] Preact loaded:", typeof render);

      console.log("[JS] Attempting: Preact render");
      try {
        const result = render(h("div", null, "Hello Preact!"), rootElement);
        console.log("[JS] ✅ Preact Success! result:", result);
        console.log("[JS] root.childNodes:", rootElement.childNodes?.length);
        const fc = rootElement.firstChild;
        console.log("[JS] firstChild:", fc);

        // Test manual DOM after Preact
        console.log("[JS] Testing manual DOM after Preact...");
        const manual = document.createElement("p");
        manual.textContent = "Manual after Preact";
        rootElement.appendChild(manual);
        console.log("[JS] After manual append, firstChild:", rootElement.firstChild?.nodeName);
        console.log("[JS] childNodes.length:", rootElement.childNodes?.length);
      } catch (e) {
        console.log("[JS] ❌ Preact Error:", e.message);
        if (e.stack) {
          const lines = e.stack.split('\n').slice(0, 4);
          console.log("[JS] Stack:", lines.join('\n'));
        }
      }

      // Also try React for comparison
      import React from "react";
      import ReactDOM from "react-dom";
      console.log("[JS] React loaded:", typeof React.createElement);

      console.log("[JS] Attempting: ReactDOM.render('Hello', root)");
      try {
        ReactDOM.render("Hello", rootElement);
        console.log("[JS] ✅ React Success!");
      } catch (e) {
        console.log("[JS] ❌ React Error:", e.message);
      }
    </script>
  </body>
</html>
