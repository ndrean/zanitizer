<html>
  <head>
    <style>
      body { background: #1e1e2e; padding: 24px; display: flex; flex-direction: column; gap: 12px; }

      /* text-align */
      .left   { background: #313244; border: 1px solid #585b70; border-radius: 6px; padding: 12px; color: #cdd6f4; font-size: 15px; text-align: left; }
      .center { background: #313244; border: 1px solid #585b70; border-radius: 6px; padding: 12px; color: #a6e3a1; font-size: 15px; text-align: center; }
      .right  { background: #313244; border: 1px solid #585b70; border-radius: 6px; padding: 12px; color: #f9e2af; font-size: 15px; text-align: right; }

      /* position: absolute */
      .rel    { background: #45475a; border: 1px solid #7f849c; border-radius: 6px; padding: 12px; color: #cdd6f4; }
      .badge  { background: #f38ba8; border-radius: 4px; padding: 4px; color: #1e1e2e; font-size: 12px;
                position: absolute; top: 4px; right: 4px; }
    </style>
  </head>
  <body>
    <div class="left">Left-aligned text (default)</div>
    <div class="center">Center-aligned text</div>
    <div class="right">Right-aligned text</div>

    <!-- broken img → alt fallback -->
    <div class="left">
      <img src="missing.png" alt="Image not found" width="80" height="40">
    </div>

    <!-- position: absolute badge (div-based, works) -->
    <div class="rel">
      <div>Container with absolute badge</div>
      <div class="badge">NEW</div>
    </div>
  </body>
</html>
