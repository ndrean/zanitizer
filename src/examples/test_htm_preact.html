<html>
  <body>
    <h1>htm + Preact Demo (QuickJS compatible)</h1>
    <div id="root"></div>
    <script type="module">
      import { h, render } from "preact";
      import { useState } from "preact/hooks";
      import htm from "htm";

      const html = htm.bind(h);

      console.log("[JS] htm + Preact loaded");

      // ============================================================
      // QuickJS Pattern: Use htm for leaf templates, h() for nesting
      // ============================================================

      // Single-line htm templates work reliably
      const Header = ({ title }) => html`<header><h1 class="title">${title}</h1></header>`;

      const Button = ({ onClick, children }) => html`<button class="btn" onclick=${onClick}>${children}</button>`;

      const Counter = () => {
        const [count, setCount] = useState(0);

        // Auto-increment for demo (stop after 3)
        if (count < 3) {
          setTimeout(() => setCount(count + 1), 500);
        }

        // Single-line htm template
        return html`<div class="counter"><p>Count: ${count}</p><button onclick=${() => setCount(count + 1)}>+1</button></div>`;
      };

      const Footer = () => html`<footer>Built with Preact + htm</footer>`;

      // App component - use h() to compose other components
      // (htm's <${Component}/> syntax causes stack overflow in QuickJS)
      const App = () => h('div', { class: 'app' },
        h(Header, { title: 'My App' }),
        h(Counter),
        h(Footer)
      );

      // Render with error handling
      const root = document.getElementById("root");
      try {
        render(h(App), root);
        console.log("[JS] Rendered successfully!");
        console.log("[JS] innerHTML:", root.innerHTML);
      } catch (e) {
        console.log("[JS] Render error:", e.message);
        if (e.stack) console.log("[JS] Stack:", e.stack.split("\n").slice(0, 5).join("\n"));
      }
    </script>
  </body>
</html>
