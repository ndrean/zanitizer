<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Svelte 5 (Runes) keyed</title>
  </head>
  <body>
    <div id="main"><!-- Svelte container --></div>
    <script src="src/examples/vendor/bench-svelte.js"></script>
    <script type="module">
      // Svelte 5 uses synchronous rendering with $state.raw —
      // no microtask scheduling needed. Just dispatch + __flush().

      function click(selector) {
        const el = document.querySelector(selector);
        if (!el) {
          console.log("Not found: " + selector);
          return;
        }
        el.dispatchEvent(new Event("click", { bubbles: true }));
        __flush();
      }

      function measure(name, fn) {
        const start = performance.now();
        fn();
        const end = performance.now();
        console.log(`[${name}] ${(end - start).toFixed(2)} ms`);
      }

      console.log("\n=== Svelte 5 Benchmark ===\n");

      // Flush initial render
      __flush();

      // Warmup
      click("#run");

      if (document.querySelectorAll("tr").length === 0) {
        console.log("Mount failed - no rows created.");
      } else {
        measure("Create 1k", () => click("#run"));
        measure("Replace 1k", () => click("#run"));
        measure("Select Row", () => click("tbody tr:nth-child(2) td:nth-child(2) a"));
        measure("Swap Rows", () => click("#swaprows"));
        measure("Remove Row", () => click("tbody tr:nth-child(2) span.glyphicon-remove"));
        measure("Append 1k", () => click("#add"));
        measure("Clear", () => click("#clear"));

        // 10k tests - may trigger GC issues with heavy DOM operations
        try {
          click("#runlots");
          __flush();
          measure("Partial Update (10k)", () => click("#update"));
          measure("Create 10k", () => click("#runlots"));
          click("#clear");
          __flush();
        } catch (e) {
          console.log("10k test skipped: " + e.message);
        }

        const count = document.querySelectorAll("tr").length;
        console.log(`\nFinal Row Count: ${count} (expected 0)`);
      }
    </script>
  </body>
</html>
