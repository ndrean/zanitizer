<!doctype html>
<html>
  <head>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  </head>
  <body>
    <div id="app">
      <h1>HTMX Test</h1>

      <!-- 1. Client-side counter via hx-on (no server needed) -->
      <div id="counter-section">
        <p>Count: <span id="count">0</span></p>
        <button
          id="inc-btn"
          hx-on:click="
            const c = document.getElementById('count');
            c.textContent = parseInt(c.textContent) + 1;
          "
        >
          +1
        </button>
      </div>

      <!-- 2. Content swap test (mocked via event interception) -->
      <button
        id="load-btn"
        hx-get="/api/greeting"
        hx-target="#result"
        hx-swap="innerHTML"
      >
        Load Greeting
      </button>
      <div id="result">Waiting...</div>

      <!-- 3. Event bubbling + closest() test -->
      <ul id="item-list">
        <li>
          <span class="item-text">Item A</span>
          <button
            class="delete-btn"
            hx-on:click="this.closest('li').remove()"
          >
            Delete
          </button>
        </li>
        <li>
          <span class="item-text">Item B</span>
          <button
            class="delete-btn"
            hx-on:click="this.closest('li').remove()"
          >
            Delete
          </button>
        </li>
        <li>
          <span class="item-text">Item C</span>
          <button
            class="delete-btn"
            hx-on:click="this.closest('li').remove()"
          >
            Delete
          </button>
        </li>
      </ul>
    </div>

    <script>
      // Mock server: intercept HTMX requests and return HTML fragments
      let requestCount = 0;
      document.addEventListener("htmx:beforeRequest", function (evt) {
        const path = evt.detail.pathInfo?.requestPath || evt.detail.path;
        if (path === "/api/greeting") {
          evt.preventDefault();
          requestCount++;
          const target = evt.detail.target || document.getElementById("result");
          target.innerHTML = `<p><strong>Hello from mock server!</strong> (request #${requestCount})</p>`;
          console.log(`[HTMX] Mocked /api/greeting → request #${requestCount}`);
        }
      });

      // Run tests after a delay (DOMContentLoaded fires after all scripts,
      // HTMX processes the DOM at that point, then setTimeout fires in the event loop)
      setTimeout(() => {
        console.log("[Test] Starting HTMX tests...");

        // Test 1: Counter via hx-on:click
        const incBtn = document.getElementById("inc-btn");
        for (let i = 0; i < 3; i++) {
          incBtn.dispatchEvent(new Event("click", { bubbles: true }));
        }
        const countVal = document.getElementById("count").textContent;
        console.log(`[Test 1] Counter: ${countVal} (expected: 3)`);

        // Test 2: Content swap via mocked hx-get
        const loadBtn = document.getElementById("load-btn");
        loadBtn.dispatchEvent(new Event("click", { bubbles: true }));

        setTimeout(() => {
          const result = document.getElementById("result").textContent;
          console.log(`[Test 2] Swap result: "${result.trim()}"`);

          // Test 3: closest() + remove via hx-on:click
          const deleteBtns = document.querySelectorAll(".delete-btn");
          const initialCount = document.querySelectorAll("#item-list li").length;
          console.log(`[Test 3] Items before delete: ${initialCount}`);

          // Delete "Item B" (second button)
          if (deleteBtns.length >= 2) {
            deleteBtns[1].dispatchEvent(new Event("click", { bubbles: true }));
          }

          const afterCount = document.querySelectorAll("#item-list li").length;
          console.log(`[Test 3] Items after delete: ${afterCount} (expected: 2)`);

          // Verify correct item was removed
          const remaining = Array.from(
            document.querySelectorAll(".item-text"),
          ).map((el) => el.textContent);
          console.log(`[Test 3] Remaining: ${JSON.stringify(remaining)}`);

          // Summary
          const pass1 = countVal === "3";
          const pass3 = afterCount === 2 && remaining.includes("Item A") && remaining.includes("Item C");
          console.log(
            `\n[Summary] Test 1 (counter): ${pass1 ? "PASS" : "FAIL"}`,
          );
          console.log(`[Summary] Test 2 (swap): check output above`);
          console.log(`[Summary] Test 3 (closest+remove): ${pass3 ? "PASS" : "FAIL"}`);
        }, 200);
      }, 500);
    </script>
  </body>
</html>
