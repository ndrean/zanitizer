<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <clipPath id="avatar-clip">
      <circle cx="175" cy="175" r="75" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a" />

  <!-- Avatar (base64-embedded, clipped to circle) -->
  <image href="{{AVATAR_B64}}" x="100" y="100" width="150" height="150"
         clip-path="url(#avatar-clip)" />

  <!-- Title -->
  <text x="100" y="380" font-family="Arial" font-size="80" fill="#ffffff" font-weight="bold">
    {{TITLE}}
  </text>

  <!-- Author -->
  <text x="100" y="480" font-family="Arial" font-size="40" fill="#94a3b8">
    Written by {{AUTHOR}}
  </text>
</svg>
