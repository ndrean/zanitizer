<html>
  <body>
    <div id="root"><!-- REACT root div --></div>
    <script src="zexp-react/dist/app.js"></script>
    <script type="module">
      /*
      async function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }
        */

      // __flush() drains all pending microtasks (React 19 scheduler uses these)
      // No need for setTimeout delays anymore!

      function runTest() {
        console.log("[Test] Flushing React mount...");
        __flush(); // Drain React's async scheduler

        const list = document.getElementById("list-container");
        const btn = document.getElementById("btn-toggle");
        const btnForce = document.getElementById("btn-force");

        // Test 1: Initial State
        console.log(`[Test] Items initially: ${list.children.length}`);

        if (list.children.length !== 7)
          console.error("❌ Initial render failed");

        // Test 2: Trigger useMemo (Click Filter)
        console.log("[Test] Clicking 'Show Even Only'");
        btn.dispatchEvent(new Event("click", { bubbles: true }));
        __flush(); // Drain re-render
        console.log(`[Test] Items after filter: ${list.children.length}`); // Should be 3
        if (list.children.length !== 3) console.error("❌ Filter failed");

        // Test 3: Force Re-render (Should NOT trigger Memo)
        // If Memo works, "Calculating filter..." should NOT print in console for this step
        console.log("[Test] Clicking 'Force Re-render'...");
        btnForce.dispatchEvent(new Event("click", { bubbles: true }));
        __flush(); // Drain re-render

        console.log(
          "[Test] ✅ Sequence Complete. Check console for Memo logs.",
        );
      }

      // Start the test
      runTest();
    </script>
  </body>
</html>
