<html>

<body>
    <div id="chart" style="width: 800px; height: 600px;"></div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script>
        // Canvas renderer works (querySelector now returns our native Canvas via node_cache),
        // but has rendering defects: stroke() fills open paths as closed polygons (e.g.
        // x-axis ticks get a triangle artifact), and text anti-aliasing looks rough.
        // → Prefer { renderer: 'svg' } for ECharts in zxp: use run_svg.js + zxp.paintSVG().
        const chartDom = document.getElementById('chart');
        const myChart = echarts.init(chartDom, null, { renderer: 'canvas', animation: false });

        myChart.setOption({
            animation: false,
            title: { text: 'ECharts Stress Test' },
            xAxis: { type: 'category', data: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'] },
            yAxis: { type: 'value' },
            series: [{ data: [150, 230, 224, 218, 135, 147, 260], type: 'line' }]
        });
    </script>
</body>

</html>
