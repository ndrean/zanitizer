<!doctype html>
<html>
  <head>
    <script src="https://d3js.org/d3.v7.min.js"></script>
  </head>
  <body>
    <div id="chart" style="width: 800px; height: 600px"></div>

    <script>
      async function runDrawD3Chart() {
        console.log("[Test] Booting D3.js Engine...");

        const width = 800;
        const height = 600;
        const margin = 40;
        const radius = Math.min(width, height) / 2 - margin;

        // Setup the SVG canvas
        const svg = d3
          .select("#chart")
          .append("svg")
          .attr("width", width)
          .attr("height", height)
          // Crucial for ThorVG!
          .attr("xmlns", "http://www.w3.org/2000/svg")
          .append("g")
          .attr("transform", `translate(${width / 2},${height / 2})`);

        // Dummy Data
        const data = {
          "In Transit": 45,
          Delivered: 120,
          Delayed: 15,
          Maintenance: 5,
        };

        // Color scale
        const color = d3
          .scaleOrdinal()
          .domain(Object.keys(data))
          .range(["#3b82f6", "#22c55e", "#ef4444", "#f59e0b"]);

        // the pie slices
        const pie = d3.pie().value((d) => d[1]);
        const data_ready = pie(Object.entries(data));

        // 4. Shape generator for the arcs (Donut chart)
        const arcGenerator = d3
          .arc()
          .innerRadius(radius * 0.5) // This makes it a donut!
          .outerRadius(radius);

        // Build the SVG DOM elements!
        svg
          .selectAll("path")
          .data(data_ready)
          .join("path")
          .attr("d", arcGenerator)
          .attr("fill", (d) => color(d.data[0]))
          .attr("stroke", "white")
          .style("stroke-width", "4px");

        // text labels
        svg
          .selectAll("text")
          .data(data_ready)
          .join("text")
          .text((d) => d.data[0])
          .attr("transform", (d) => `translate(${arcGenerator.centroid(d)})`)
          .style("text-anchor", "middle")
          .style("font-family", "sans-serif")
          .style("font-size", "16px")
          .style("fill", "#ffffff")
          .style("font-weight", "bold");

        // Extract the SVG string
        const svgElement = document.querySelector("#chart svg");
        const svgString = svgElement ? svgElement.outerHTML : "";

        // Send to Zig Compositor (just the SVG saved as PNG)
        zexplorer.generateRoutePng(
          [], // Empty tiles array
          svgString,
          "D3_Chart_report.png",
          width,
          height,
        );

        console.log("🟢 Chart Report generated");
      }

      runDrawD3Chart().catch((e) =>
        console.error("Error:", e.message, e.stack),
      );
    </script>
  </body>
</html>
