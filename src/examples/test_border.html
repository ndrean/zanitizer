<html>
  <head>
    <style>
      body { background: #1e1e2e; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
      .card { background: #313244; border: 2px solid #cba6f7; border-radius: 8px; padding: 16px; color: #cdd6f4; }
      .row  { display: flex; flex-direction: row; gap: 8px; }
      .cell { background: #45475a; border: 1px solid #585b70; border-radius: 4px; padding: 12px; color: #a6e3a1; font-size: 14px; }
      .alert { border: 2px solid #f38ba8; border-radius: 6px; padding: 12px; color: #f38ba8; }
    </style>
  </head>
  <body>
    <div class="card">Card with purple border + border-radius 8px</div>
    <div class="row">
      <div class="cell">Cell A</div>
      <div class="cell">Cell B</div>
      <div class="cell">Cell C</div>
    </div>
    <div class="alert">Alert — red border, no background fill</div>
  </body>
</html>
